name: Blockchain API E2E Tests

on:
  push:
    branches: [master]
    paths:
      - "packages/blockchain-api/**"
      - "packages/blockchain-api-client/**"
  pull_request:
    paths:
      - "packages/blockchain-api/**"
      - "packages/blockchain-api-client/**"

jobs:
  # Build anchor once and share the generated types/IDLs as an artifact. The
  # matrix jobs only need target/types (to build @helium/idls); having each of
  # them run build-anchor meant 17 full rebuilds whenever the cache was evicted
  # (the repo sits at the 10GB Actions cache cap), and a cold anchor build
  # can't finish inside the matrix jobs' 20-minute timeout.
  build-idls:
    runs-on: ubuntu-latest
    # A cold-cache anchor build of the whole workspace takes well over 20
    # minutes; this is the only job that compiles, so give it room.
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - uses: ./.github/actions/build-anchor/
        with:
          testing: true
      - name: Upload anchor types and IDLs
        uses: actions/upload-artifact@v4
        with:
          name: anchor-types
          path: |
            target/types
            target/idl
          retention-days: 1
          if-no-files-found: error

  e2e-tests:
    needs: build-idls
    runs-on: ubuntu-latest
    # Backstop so a hung test (e.g. a stalled RPC) fails fast instead of running
    # until GitHub's default 6h job timeout and holding a runner.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        test:
          - name: hotspot-transfer
            file: hotspot-transfer.test.ts
          - name: token-transfer
            file: token-transfer.test.ts
          - name: data-credits-burn
            file: data-credits-burn.test.ts
          - name: token-burn-memo
            file: token-burn-memo.test.ts
          - name: claim-hotspot-rewards
            file: claim-hotspot-rewards.test.ts
          - name: hotspot-burn
            file: hotspot-burn.test.ts
          - name: squads-lifecycle
            file: squads-lifecycle.test.ts
          - name: squads-propose
            file: squads-propose.test.ts
          - name: update-rewards
            file: update-rewards-destination.test.ts
          - name: welcome-pack
            file: welcome-pack.test.ts
          - name: rewards
            file: rewards.test.ts
          - name: automation
            file: automation.test.ts
          - name: hotspot-updates
            file: hotspot-updates.test.ts
          - name: reward-contract
            file: reward-contract.test.ts
          - name: estimate-creation-cost
            file: estimate-creation-cost.test.ts
          - name: governance
            file: governance.test.ts
          - name: migration
            file: migration.test.ts

    name: ${{ matrix.test.name }}

    env:
      NODE_ENV: test
      NEXT_PORT: 3000
      SOLANA_CLI_VERSION: 2.1.6
      SURFPOOL_RPC_URL: http://127.0.0.1:8899
      ASSET_ENDPOINT: ${{ secrets.ASSET_ENDPOINT }}
      NEXT_PUBLIC_SOLANA_CLUSTER: mainnet
      SURFPOOL_SHOW_LOGS: "0"
      SURFPOOL_HEALTH_TIMEOUT_MS: "180000"

    defaults:
      run:
        working-directory: packages/blockchain-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache surfpool binary
        id: cache-surfpool
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/surfpool
            ~/.cargo/.crates2.json
            ~/.cargo/.crates.toml
          key: ${{ runner.os }}-surfpool-bin-v0.11.2

      - name: Install Surfpool CLI
        if: steps.cache-surfpool.outputs.cache-hit != 'true'
        env:
          # crates.io downloads intermittently fail with "HTTP2 framing layer";
          # fetch via git CLI and disable HTTP/2 multiplexing to avoid it.
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          CARGO_HTTP_MULTIPLEXING: "false"
        run: |
          cargo install --git https://github.com/txtx/surfpool --tag v0.11.2 --locked --force

      - name: Download anchor types and IDLs
        uses: actions/download-artifact@v4
        with:
          name: anchor-types
          path: target
      - uses: ./.github/actions/setup-ts/

      - name: Write TESTING_KEY to file
        run: |
          echo "${{ secrets.TESTING_KEY }}" > testing_key.json
          test -s testing_key.json || (echo 'TESTING_KEY is empty' && exit 1)

      - name: Write TESTING_KEY_2 to file
        run: |
          echo "${{ secrets.TESTING_KEY_2 }}" > testing_key_2.json
          test -s testing_key_2.json || (echo 'TESTING_KEY_2 is empty' && exit 1)

      - name: Validate ASSET_ENDPOINT secret
        run: |
          if [ -z "${ASSET_ENDPOINT}" ]; then
            echo "ASSET_ENDPOINT secret is not set. Please add it in repository secrets." >&2
            exit 1
          fi

      - name: Run ${{ matrix.test.name }} tests
        env:
          TEST_WALLET_KEYPAIR_PATH: ${{ github.workspace }}/packages/blockchain-api/testing_key.json
          TEST_WALLET_2_KEYPAIR_PATH: ${{ github.workspace }}/packages/blockchain-api/testing_key_2.json
          FEE_PAYER_WALLET_PATH: ${{ github.workspace }}/packages/blockchain-api/testing_key.json
          SURFPOOL_CMD: ${{ runner.tool_cache }}/cargo/bin/surfpool
        run: |
          # Fallback if cached path not present
          if [ ! -x "$SURFPOOL_CMD" ]; then
            export SURFPOOL_CMD="$HOME/.cargo/bin/surfpool"
          fi
          echo "Using SURFPOOL_CMD=$SURFPOOL_CMD"
          pnpm test:e2e:file tests/e2e/${{ matrix.test.file }}
