name: NPM Publish

env:
  SOLANA_CLI_VERSION: 2.1.6
  NODE_VERSION: 24.13.1

permissions:
  id-token: write # Required for OIDC
  contents: read

on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - "v*" # Push events to matching v*, i.e. v0.0.1

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: ./.github/actions/setup/
      - uses: ./.github/actions/setup-anchor/
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - uses: ./.github/actions/build-anchor/
        with:
          testing: false
          devnet: false
      - uses: ./.github/actions/setup-ts/
      - name: Publish packages
        run: |
          for pkg in packages/*/; do
            [ -f "$pkg/package.json" ] || continue

            is_private=$(node -p "require('./$pkg/package.json').private || false")
            [ "$is_private" = "true" ] && continue

            name=$(node -p "require('./$pkg/package.json').name")
            version=$(node -p "require('./$pkg/package.json').version")

            published=$(npm view "$name@$version" version 2>/dev/null || echo "")
            if [ "$version" = "$published" ]; then
              echo "Skipping $name@$version (already published)"
              continue
            fi

            echo "Publishing $name@$version..."
            npm publish "$pkg" --provenance --access public
          done
